feature:
  name: effect-server
  product: durable-streams
  description: Implement an Effect-native Durable Streams server that conforms to PROTOCOL.md and composes storage, coordination, scheduling, and telemetry through Effect layers.

components:
  PACKAGE:
    requirements:
      1: "The Effect-native server implementation package is named `effect-durable-streams`."
      2: "The Effect-native client implementation is renamed away from `effect-durable-streams` to a client-specific package name such as `effect-durable-client`."
      3: "The shared `HttpApi` protocol contract is package-neutral and imported by both the Effect server and Effect client."
  HTTP:
    requirements:
      1: "The Effect server routes reserved `__ds` control paths before application stream paths."
      2: "The Effect server implements the base Durable Streams HTTP methods and headers defined by `PROTOCOL.md`."
      3: "The Effect server supports raw byte request and response bodies for non-JSON stream content."
      4: "The Effect server supports long-poll and SSE live reads without unbounded buffering."
      5: "The Effect server emits protocol status codes, headers, and JSON error bodies required by `packages/server-conformance-tests`."
      6: "JSON append handling applies protocol message normalization, including one-level array flattening and empty-array method semantics."
  HTTP_API:
    requirements:
      1: "Structured reserved control-plane endpoints are described once as an Effect `HttpApi` contract shared by server and Effect client."
      2: "The Effect server implements the shared `HttpApi` contract with `HttpApiBuilder` handlers for subscription, schedule, JWKS, claim, ack, release, and callback routes."
      3: "The Effect client derives reserved control-plane request construction, response decoding, and typed errors from `HttpApiClient` instead of hand-written endpoint plumbing."
      4: "The base stream data plane remains implemented with `HttpRouter` because it requires raw bytes, protocol headers, long-poll, and SSE streaming behavior."
      5: "Any hand-written Effect client code around the shared `HttpApi` contract is limited to semantic wrappers such as scoped pull-wake leases and producer resources."
      6: "Control-plane handlers lower store and manager failures into the declared `HttpApi` error variants before returning to the shared contract."
  STORE:
    requirements:
      1: "Persistence is supplied through an Effect `Layer`, not hardcoded to a concrete database."
      2: "The store algebra exposes atomic transactions for stream append, producer state update, tail-advance recording, and schedule status transitions."
      3: "The in-memory store implementation is backed by Effect STM transactional data structures."
      4: "Durable store implementations document their crash consistency guarantees."
      5: "Every store implementation passes the shared server conformance suite for the capabilities it advertises."
      6: "Offset generation is per stream and never depends on a single global append counter."
      7: "The store algebra exposes stream listing by pattern for subscription glob backfill."
      8: "Durable store implementations serialize validate-and-append per `(stream, producerId)` so concurrent appends cannot both observe the same prior producer sequence."
      9: "Durable store implementations may be built on a lower ordered transactional key-value driver, but the public server store algebra remains protocol/domain-shaped."
      10: "The lower ordered key-value driver exposes point reads/writes, ordered range scans, and synchronous transaction callbacks; it does not run arbitrary `Effect` values inside storage transactions."
      11: "The first durable backend target is an LMDB ordered key-value driver wrapped in an Effect scoped layer."
      12: "`@effect/platform` `KeyValueStore` may be exposed as a narrow compatibility adapter, but it is not sufficient for the core Durable Streams server store."
      13: "The preferred strategic durable backend shape is SQL/Postgres-compatible storage, with PGlite or an equivalent embedded Effect SQL layer as the first local SQL target; LMDB remains an interim adapter or spike."
      14: "A SQL-shaped store can update authoritative append-log tables and derived query tables in one transaction so colocated host components can observe ready work without changing protocol correctness."
  PRODUCERS:
    requirements:
      1: "Producer validation treats duplicate producer appends as successful protocol control flow."
      2: "Producer validation treats stale producer epochs as typed fencing failures."
      3: "Producer state updates and accepted appends are committed atomically by durable stores."
      4: "Append decisions distinguish plain accepted appends from producer-accepted appends so HTTP status mapping preserves 204 vs 200 semantics."
      5: "Closed-stream, content-type mismatch, stream sequence regression, and producer sequence-gap conflicts are resolved through one append decision path with protocol precedence."
      6: "Producer responses report the highest accepted sequence for the producer tuple, not merely the request sequence."
  READS:
    requirements:
      1: "Catch-up reads implement offset sentinels, retention errors, fork stitching, cache headers, ETags, up-to-date, and EOF semantics from `PROTOCOL.md`."
      2: "ETags vary with stream closure status so EOF discovery cannot be hidden by 304 responses."
      3: "Long-poll implements timeout, immediate EOF at closed tail, `offset=now`, monotonic cursor generation, and fork-specific waiter behavior."
      4: "SSE emits protocol data/control events, closes around the protocol collapse interval, and does not rely on indefinite heartbeats as the primary liveness model."
      5: "Live read notification works for every advertised backend, including durable multi-process backends."
      6: "Long-poll and SSE subscribe to live notifications before re-checking the stream tail so appends cannot be lost between check and park."
  WAKE:
    requirements:
      1: "Subscription wake evaluation runs after append commit from tail-advance signals, not inside the append transaction."
      2: "Filtered subscription CEL evaluation runs in Effect outside STM or durable append transactions."
      3: "Wake evaluation advances internal evaluated cursors independently from public ack cursors."
      4: "The notification transport is an explicit layer that can wake waiters across processes for durable multi-node backends."
      5: "Wake evaluation treats notification offsets as hints and re-reads durable tail state before deciding pending work."
      6: "Wake evaluation scans durable stream records from each linked subscription's evaluated cursor to the current durable tail and records wake snapshots for matching records without advancing the public ack cursor."
      7: "For colocated SQL/PGlite deployments, live SQL query or changefeed observation may be used as an optimized host activation transport over derived ready-work tables, while pull-wake remains the portable external protocol."
      8: "SQL CEL pushdown is capability-detected: when a backend exposes a CEL evaluator such as pg-cel the wake evaluator may push predicates into SQL, otherwise it falls back to server-side Effect CEL evaluation with the same wake decisions."
  SUBSCRIPTIONS:
    requirements:
      1: "Subscription create, read, delete, stream membership, webhook callback, pull-wake claim, ack, and release are implemented under `__ds/subscriptions`."
      2: "Subscription state records linked streams, inclusive acked offsets, wake generation, wake id, lease holder, and lease expiry."
      3: "Callback, ack, and release reject stale generation or wake id with `FENCED` and do not advance cursors."
      4: "Lease expiry clears the holder and schedules a new wake when pending work remains."
      5: "Glob subscription creation backfills existing matching streams at their current tail offsets."
  WEBHOOKS:
    requirements:
      1: "Webhook subscriptions expose JWKS public key discovery under `__ds/jwks.json`."
      2: "Webhook deliveries are Ed25519 signed over timestamp plus exact raw request body."
      3: "Webhook synchronous `{ done: true }` acks the delivered wake snapshot."
      4: "Webhook retry metadata is persisted and survives process restart in durable store implementations."
      5: "Webhook URL validation rejects SSRF-prone production targets before subscription state is created."
      6: "Webhook signer keys persist across restart and JWKS rotation retains old public keys through the replay window."
      7: "Webhook `{ done: true }` acknowledgements advance only the delivered wake snapshot and then re-evaluate pending work against the current tail."
  PULL_WAKE:
    requirements:
      1: "Pull-wake subscriptions append wake events to ordinary Durable Streams wake streams."
      2: "A successful pull-wake claim returns a scoped claim token, generation, wake id, stream snapshot, and lease TTL."
      3: "Pull-wake ack without `done: true` acts as heartbeat and extends the lease."
      4: "Pull-wake release does not advance cursors and rewakes when pending work remains."
      5: "Pull-wake ack with `done: true` advances only the offsets represented by the claimed wake snapshot and then re-evaluates pending work against the current tail."
  SCHEDULES:
    requirements:
      1: "Schedule APIs are implemented under `__ds/schedules`."
      2: "Scheduled append fires no earlier than its RFC3339 `at` timestamp."
      3: "Schedule fire uses the same append implementation as normal client appends."
      4: "Schedule status transitions are persisted before externally visible effects are acknowledged."
      5: "Schedule runner subscriptions are armed before each due-schedule check so earlier schedule creation or cancellation cannot be lost between check and sleep."
      6: "Schedules that require exactly-once fire across restart use producer tuples on the target append."
  FILTERS:
    requirements:
      1: "Filtered subscriptions evaluate CEL on the server and never in the Effect client."
      2: "Unsupported filters are rejected before subscription state is created."
      3: "Non-matching filtered events do not wake the subscription."
      4: "Filtered subscriptions maintain public ack cursors separately from internal evaluated cursors."
      5: "Filter evaluation receives one durable event envelope at a time, including decoded value, stream path, offset, headers, content type, and state-event collection/key/operation metadata when present."
  OBSERVABILITY:
    requirements:
      1: "The server exposes OpenTelemetry tracing through Effect's tracer layer."
      2: "HTTP route spans use low-cardinality route names rather than raw stream paths."
      3: "Domain spans cover append, producer validation, subscription wake, claim, ack, webhook delivery, and schedule fire."
      4: "Metrics cover request counts, append decisions, wake attempts, claim conflicts, fenced requests, webhook retries, and schedule outcomes."
  CONFORMANCE:
    requirements:
      1: "The Effect server runs against `packages/server-conformance-tests` as a first-class server target."
      2: "Additional conformance tests are added before advertising filtered subscriptions or schedules."
      3: "Backend-specific conformance runs verify memory and durable store layers separately."
      4: "Routing conformance proves reserved `__ds` paths hit control handlers before wildcard stream handlers."
      5: "Durable-backend conformance proves concurrent same-stream producer appends preserve producer sequence."
      6: "Server behavior compatibility is defined by `packages/server-conformance-tests`, not by source or API compatibility with `packages/server`."
      7: "Durable-backend conformance proves producer-state and log append atomicity across crash/retry windows."
      8: "Durable-backend conformance proves ordered range scans return stream records in offset order and subscription scans start from the evaluated cursor."

constraints:
  SCOPE:
    requirements:
      1: "The Effect server must not import implementation code from `packages/server` or `packages/caddy-plugin`."
      2: "The Effect server may reuse protocol fixtures, schemas, and conformance tests from existing packages."
      3: "Authentication and authorization remain deployment policy unless a conformance requirement explicitly covers them."
      4: "Source or API compatibility with `packages/server` is a non-goal."
  TOOLING:
    requirements:
      1: "Repository linting rejects hand-written protocol numeric parsing in `effect-durable-streams` source so protocol/header decode paths use Effect Schema or shared protocol schemas."
      2: "The Effect server package composes its TypeScript config from the repository root strict Effect language-service settings and exposes diagnostics scripts for the strict Effect diagnostics gate."
      3: "`effect-durable-streams` file names match exported abstractions: `Server.ts` exports server construction or layers, while route composition exports live in router-named modules."
